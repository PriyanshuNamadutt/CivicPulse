<!DOCTYPE html>
<html>
<head>
    <title>Are you Alive</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0a0a0f;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: #111118;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    text-align: center;
}

/* Logo */
.logo {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 20px;
    color: #c8f04e;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a22;
    color: white;
    outline: none;
}

input:focus {
    border-color: #c8f04e;
}

/* Buttons */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #c8f04e;
    color: black;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    opacity: 0.9;
}

/* Divider */
hr {
    margin: 20px 0;
    border: 0.5px solid #333;
}

h3 {
    margin-bottom: 5px;
}
</style>

<div class="container">

    <div class="logo">Are you Alive</div>

    <h3>Register</h3>
    <input type="email" id="r-email" placeholder="Email">
    <input type="password" id="r-password" placeholder="Password">
    <button onclick="register()">Register</button>

    <hr>

    <h3>Login</h3>
    <input type="email" id="l-email" placeholder="Email">
    <input type="password" id="l-password" placeholder="Password">
    <button onclick="login()">Login</button>

</div>

<script>
async function register() {
    const email = document.getElementById("r-email").value;
    const password = document.getElementById("r-password").value;

    try {
        const res = await fetch("http://localhost:5000/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if ( res.ok ) {

            alert(data.msg || "Registered");
            localStorage.setItem("token", data.token);
            window.location.href = "home.html";
        }
    } catch (err) {
        alert("Error connecting to server");
    }
}

async function login() {
    const email = document.getElementById("l-email").value;
    const password = document.getElementById("l-password").value;

    try {
        const res = await fetch("http://localhost:5000/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if ( res.ok ) {
            alert(data.msg || "Logged in");
            localStorage.setItem("token", data.token);
            window.location.href = "home.html";
        }
    } catch (err) {
        alert("Error connecting to server");
    }
}


</script>

</body>
</html>
